##### Prefix #####
# Keep default tmux prefix: Ctrl-b
set -g prefix C-b


##### Mouse mode #####
# Enable mouse by default
set -g mouse on

# Toggle mouse mode with: Ctrl-b m
bind-key m if -F '#{==:#{mouse},on}' \
    'set-option -g mouse off \; display-message "Mouse mode: OFF"' \
    'set-option -g mouse on  \; display-message "Mouse mode: ON"'


##### Scrollback history #####
# Increase scrollback buffer.
# This means each pane can keep up to 50,000 lines of history.
set -g history-limit 50000


##### Status bar #####
# Show mouse mode and current time in the status bar
set -g status-right ' Mouse: #{?#{==:#{mouse},on},ON,OFF} | %Y-%m-%d %H:%M '


##### Copy mode #####
# Use vi-style copy mode keys
setw -g mode-keys vi

# Enter copy mode with Ctrl-b [
bind-key [ copy-mode

# In copy mode:
#   v      starts selection
#   y      copies selection
#   Escape cancels
#
# This copies only inside the current pane/copy-mode buffer.
# It does not require selecting across terminal/zellij panels.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Optional: copy with Enter as well
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel


##### Paste inside tmux #####
# Paste tmux buffer with Ctrl-b ]
bind-key ] paste-buffer


##### Better terminal compatibility #####
# Good default for modern terminals
set -g default-terminal "tmux-256color"

# Faster escape response, useful for vim/neovim
set -sg escape-time 10


##### Pane navigation basics #####
# Split panes
bind-key | split-window -h
bind-key - split-window -v

# Reload config quickly with Ctrl-b r
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
